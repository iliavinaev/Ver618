      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

      /* === Command-dashboard dark palette (muted charcoal/grey, low-saturation) === */
      :root {
        /* Surfaces — near-black charcoal */
        --bg-base: #0d1117;          /* page background */
        --bg-panel: #161b22;         /* primary panel */
        --bg-panel-2: #1c232b;       /* secondary panel */
        --bg-elevated: #232b34;      /* hover/selected */
        --bg-overlay: #0d1117e0;     /* modal overlay */

        /* Borders / dividers */
        --border-subtle: #232b34;
        --border-default: #313c47;
        --border-strong: #46535f;
        --border-accent: #5a6675;

        /* Text — soft greys */
        --text-primary: #c9d1d9;     /* main text */
        --text-secondary: #8b949e;   /* secondary, muted */
        --text-tertiary: #6e7681;    /* very subtle */
        --text-inverted: #0d1117;

        /* MIL-STD-2525C affiliations — desaturated for dark display */
        --mil-friend: #5a8bb0;       /* steel blue — friendly */
        --mil-friend-glow: #6a9ac0;
        --mil-friend-bg: rgba(90,139,176,0.12);
        --mil-hostile: #c25b5b;      /* muted brick — hostile */
        --mil-hostile-glow: #d07070;
        --mil-hostile-bg: rgba(194,91,91,0.12);
        --mil-unknown: #b8a04a;      /* muted ochre — unknown */
        --mil-unknown-glow: #cab35e;
        --mil-unknown-bg: rgba(184,160,74,0.12);
        --mil-neutral: #6a9a6a;      /* muted sage — neutral/civilian */
        --mil-neutral-bg: rgba(106,154,106,0.12);

        /* Status colors */
        --status-ok: #6a9a6a;
        --status-warn: #b8a04a;
        --status-crit: #c25b5b;
        --status-info: #5a8bb0;
      }

      body, html, #root { background: var(--bg-base); color: var(--text-primary); }

      .f-display { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; letter-spacing: 0.02em; }
      .f-typewriter { font-family: 'JetBrains Mono', monospace; font-weight: 500; letter-spacing: 0.05em; }
      .f-mono { font-family: 'JetBrains Mono', monospace; font-weight: 400; }
      .f-cond { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; }
      .f-serif { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; line-height: 1.55; }

      .riso-paper {
        background: var(--bg-base);
        background-image:
          radial-gradient(circle at 20% 30%, rgba(90,139,176,0.04) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, rgba(194,91,91,0.03) 0%, transparent 50%);
        color: var(--text-primary);
      }

      .stamp { display: inline-block; border: 1px solid var(--mil-hostile); color: var(--mil-hostile);
        padding: 3px 10px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.18em;
        font-size: 10px; text-transform: uppercase; background: var(--mil-hostile-bg); }

      .cls-banner {
        background: var(--bg-panel);
        color: var(--text-secondary);
        letter-spacing: 0.4em;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        padding: 6px 0;
        text-align: center;
        border-top: 1px solid var(--mil-hostile);
        border-bottom: 1px solid var(--mil-hostile);
        text-transform: uppercase;
      }

      .double-rule {
        border-top: 1px solid var(--border-default);
        margin: 0 0 4px 0;
      }

      /* === Buttons === */
      .btn-riso {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: 1px solid var(--mil-friend);
        background: var(--mil-friend-bg);
        color: var(--mil-friend);
        padding: 10px 22px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s ease;
        border-radius: 2px;
      }
      .btn-riso:hover { background: var(--mil-friend); color: var(--text-inverted); box-shadow: 0 0 8px rgba(90,139,176,0.4); }
      .btn-riso:disabled { background: var(--bg-panel); border-color: var(--border-subtle); color: var(--text-tertiary); cursor: not-allowed; box-shadow: none; }
      .btn-alt { background: transparent; border-color: var(--border-default); color: var(--text-secondary); }
      .btn-alt:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-strong); box-shadow: none; }

      /* === Nation flags (compact) === */
      .nation-flag { display: inline-block; width: 14px; height: 9px; border: 1px solid var(--border-default); vertical-align: middle; }
      .flag-US { background: linear-gradient(to bottom, #b22234 33%, #fff 33% 66%, #3c3b6e 66%); }
      .flag-DE { background: linear-gradient(to bottom, #000 33%, #dd0000 33% 66%, #ffce00 66%); }
      .flag-FR { background: linear-gradient(to right, #002395 33%, #fff 33% 66%, #ed2939 66%); }
      .flag-UK { background: #012169; }
      .flag-PL { background: linear-gradient(to bottom, #fff 50%, #dc143c 50%); }
      .flag-NO { background: #ed2939; }
      .flag-UA { background: linear-gradient(to bottom, #005bbb 50%, #ffd500 50%); }
      .flag-NO\\/US { background: linear-gradient(to right, #ed2939 50%, #b22234 50%); }

      /* Performance grade colors */
      .grade-A { color: #6a9a6a; } .grade-B { color: #6a9a6a; }
      .grade-C { color: #b8a04a; } .grade-D { color: #d4995a; } .grade-F { color: #c25b5b; }

      /* Animations */
      .pulse-emit { animation: emit 1.5s ease-in-out infinite; }
      @keyframes emit { 50% { opacity: 0.35; } }
      .alert-pulse { animation: alertpulse 0.8s ease-in-out infinite; }
      @keyframes alertpulse { 50% { opacity: 0.55; } }
      .glow-friendly { filter: drop-shadow(0 0 3px var(--mil-friend-glow)); }
      .glow-hostile { filter: drop-shadow(0 0 3px var(--mil-hostile-glow)); }
      .glow-unknown { filter: drop-shadow(0 0 3px var(--mil-unknown-glow)); }

      /* === Asset menu (dark dropdown) === */
      .asset-menu {
        position: absolute;
        background: var(--bg-panel);
        border: 1px solid var(--border-default);
        padding: 12px;
        font-family: 'Inter', sans-serif;
        min-width: 240px;
        max-width: 320px;
        z-index: 100;
        box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 0 1px var(--border-subtle);
        color: var(--text-primary);
        border-radius: 4px;
      }
      .asset-menu button {
        display: block; width: 100%; text-align: left; padding: 7px 10px;
        margin: 3px 0;
        border: 1px solid var(--border-default);
        background: var(--bg-panel-2);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif; font-size: 12px;
        cursor: pointer;
        border-radius: 2px;
        transition: all 0.12s;
      }
      .asset-menu button:hover:not(:disabled) {
        background: var(--mil-friend-bg);
        border-color: var(--mil-friend);
        color: var(--mil-friend);
      }
      .asset-menu button:disabled { opacity: 0.35; cursor: not-allowed; }
      .asset-menu button.danger { border-color: var(--mil-hostile); color: var(--mil-hostile); background: var(--mil-hostile-bg); }
      .asset-menu button.danger:hover:not(:disabled) { background: var(--mil-hostile); color: var(--text-inverted); }
      .asset-menu .mode-row { display: flex; gap: 4px; margin: 4px 0; }
      .asset-menu .mode-row button { flex: 1; text-align: center; }

      /* Alert cards */
      .alert-card {
        padding: 8px 10px; margin: 4px 0;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px; line-height: 1.4;
        border-left: 3px solid;
        display: flex; gap: 8px; align-items: flex-start;
        border-radius: 2px;
      }
      .alert-card.info { border-color: var(--status-info); background: rgba(90,139,176,0.10); color: #6a9ac0; }
      .alert-card.warn { border-color: var(--status-warn); background: rgba(184,160,74,0.10); color: #b8a04a; }
      .alert-card.crit { border-color: var(--mil-hostile); background: rgba(194,91,91,0.10); color: var(--mil-hostile-glow); font-weight: 600; }
      .alert-card.phase { border-color: var(--mil-friend); background: var(--mil-friend-bg); color: var(--mil-friend-glow); font-weight: 600; }
      .alert-card .dismiss { background: none; border: 0; cursor: pointer; padding: 0; font-size: 14px; line-height: 1; flex-shrink: 0; color: inherit; opacity: 0.6; }
      .alert-card .dismiss:hover { opacity: 1; }

      /* Scrollbar (dark) */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg-base); }
      ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

      /* Inputs (dark) */
      input, select, textarea {
        background: var(--bg-panel-2);
        color: var(--text-primary);
        border: 1px solid var(--border-default);
        padding: 6px 10px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        border-radius: 2px;
        outline: none;
      }
      input:focus, select:focus, textarea:focus {
        border-color: var(--mil-friend);
        box-shadow: 0 0 0 2px rgba(90,139,176,0.2);
      }

      /* COP card pattern */
      .cop-card {
        background: var(--bg-panel);
        border: 1px solid var(--border-default);
        border-radius: 3px;
        padding: 10px 12px;
        margin-bottom: 8px;
      }
      .cop-card-header {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-size: 10px;
        color: var(--text-secondary);
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border-subtle);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
